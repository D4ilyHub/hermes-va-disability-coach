name: Source freshness
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python skills/va-disability-coach/scripts/check_source_freshness.py --as-of 2026-07-16 --json
# Intentionally no schedule/cron trigger. Source updates require a user or maintainer action.
