name: Link check
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200,206,429 --exclude-mail "**/*.md" "**/*.csv"
          fail: true
