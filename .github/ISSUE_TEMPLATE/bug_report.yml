name: Bug report
description: Report a reproducible code, documentation, or routing defect.
title: "[Bug report] "
labels: []
body:
  - type: markdown
    attributes:
      value: "Do not include personal medical records, identifiers, credentials, or user-specific claim facts."
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: authority
    attributes:
      label: Source, authority class, and effective date
      description: Provide an official locator when applicable.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction or affected files
  - type: textarea
    id: expected
    attributes:
      label: Expected correction
